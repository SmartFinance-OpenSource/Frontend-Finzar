<h1 mat-dialog-title>Add a new transaction</h1>

<mat-dialog-content>
    <div class="fields">
        <div>
            <mat-form-field appearance="fill">
                <mat-label>Type</mat-label>
                <mat-select [(ngModel)]="newTransaction.transaction_type_id">
                    <mat-option *ngFor="let transactionType of transactionTypes" [value]="transactionType.id">
                        {{ transactionType.name }}
                    </mat-option >
                </mat-select>
            </mat-form-field>
        </div>
        <div>
            <mat-form-field appearance="fill">
                <mat-label>Amount</mat-label>
                <input matInput placeholder="Amount" type="number" required [(ngModel)]="newTransaction.amount">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field>
                <mat-label>Choose a date</mat-label>
                <input matInput [matDatepicker]="picker" [(ngModel)]="newTransaction.date">
                <mat-hint>MM/DD/YYYY</mat-hint>
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>
        </div>
        <div>
            <mat-form-field appearance="fill">
                <mat-label>Note</mat-label>
                <input matInput placeholder="Note (Optional)" [(ngModel)]="newTransaction.note">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field appearance="fill">
                <mat-label>Category</mat-label>
                <mat-select [(ngModel)]="newTransaction.category_id">
                    <mat-option *ngFor="let category of categories" [value]="category.id">
                        {{ category.name }}
                    </mat-option >
                </mat-select>
            </mat-form-field>
        </div>
    </div>
</mat-dialog-content>
